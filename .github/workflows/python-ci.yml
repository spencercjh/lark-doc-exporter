name: python-ci

on:
  pull_request:
    paths:
      - '.github/workflows/python-ci.yml'
      - 'Makefile'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**'
      - 'tests/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/python-ci.yml'
      - 'Makefile'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --python 3.13 --group dev

      - name: Run Makefile CI
        run: make ci
