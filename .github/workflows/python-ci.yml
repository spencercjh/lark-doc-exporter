name: python-ci

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  PYTHON_VERSION: "3.14"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ github.event_name != 'pull_request' || steps.filter.outputs.python == 'true' }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            python:
              - '.github/workflows/python-ci.yml'
              - 'Makefile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'src/**'
              - 'tests/**'

  lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --python ${{ env.PYTHON_VERSION }} --group dev

      - name: Run lint
        run: make lint

  test:
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.python == 'true'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --python ${{ env.PYTHON_VERSION }} --group dev

      - name: Run tests
        run: make test

  build:
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.python == 'true'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --python ${{ env.PYTHON_VERSION }} --group dev

      - name: Run build
        run: make build

  ci:
    runs-on: ubuntu-latest
    needs:
      - changes
      - lint
      - test
      - build
    if: always()
    steps:
      - name: Check Python workflow result
        run: |
          if [[ "${{ needs.changes.outputs.python }}" != "true" ]]; then
            echo "No Python-relevant changes."
            exit 0
          fi

          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.build.result }}"; do
            if [[ "${result}" != "success" ]]; then
              echo "Python checks did not complete successfully: ${result}"
              exit 1
            fi
          done
